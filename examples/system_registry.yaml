systems:
  - system_id: outlook_desktop
    type: windows_app
    adapter: outlook_com
    login_method: existing_profile
    notes: Prefer Classic Outlook. New Outlook requires a different path.

  - system_id: security_portal
    type: web
    base_url: https://security.internal
    login_method: sso
    harness: extension_bridge
    supported_harnesses:
      - extension_bridge
      - page_agent_dom
    pages:
      - page_id: export_registration
        success_markers:
          - 반출 등록
        field_labels:
          traveler_name: 출장자명
          destination_country: 국가
          serial_number: 시리얼번호
          customs_number: 통관번호
        required_fields:
          - traveler_name
          - destination_country
          - serial_number
          - customs_number
        final_action:
          button_text: 등록
          approval_required: true

  - system_id: dhl
    type: web
    base_url: https://mydhl.express.dhl
    login_method: password
    harness: extension_bridge
    supported_harnesses:
      - extension_bridge
      - page_agent_dom
    pages:
      - page_id: create_shipment
        success_markers:
          - Create Shipment
        field_labels:
          receiver_address: Receiver Address
          customs_number: Customs Number
          item_description: Item Description
        required_fields:
          - shipper
          - receiver
          - customs_number
          - item_description
        final_action:
          button_text: Submit
          approval_required: true

  - system_id: cube
    type: web_or_windows_app
    adapter: extension_bridge
    login_method: existing_session
    notes: Prefer Cube web through extension bridge. If only desktop is available, add a Windows UIA adapter.
